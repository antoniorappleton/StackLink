<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StackLink - Gestor de Links Pessoal" />
  <meta name="theme-color" content="#0f172a" />
  <title>StackLink</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Scripts (Modules) -->
  <script type="module" src="js/app.js"></script>
</head>

<body>
  <!-- Atmospheric Background Elements -->
  <div class="bg-glow"></div>
  
  <div class="app-container">
    <!-- Auth Screen -->
    <section id="auth-screen" class="hidden">
      <div class="auth-card glass">
        <div class="auth-logo">
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
          </svg>
        </div>
        <h1>StackLink</h1>
        <p>A sua biblioteca digital de links, reinventada.</p>
        <button id="login-btn" class="btn btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor"
              d="M12.545 10.239v3.821h5.445c-.712 2.315-2.647 3.972-5.445 3.972c-3.332 0-6.033-2.701-6.033-6.032s2.701-6.032 6.033-6.032c1.498 0 2.866.549 3.921 1.453l2.814-2.814C17.503 2.988 15.139 2 12.545 2C7.021 2 2.543 6.477 2.543 12s4.478 10 10.002 10c8.396 0 10.249-7.85 9.426-11.748l-9.426-.013z" />
          </svg>
          Entrar com Google
        </button>
      </div>
    </section>

    <!-- Main App -->
    <div id="main-app" class="hidden">
      <header class="app-header glass">
        <div class="logo">
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
          </svg>
          <span class="text">StackLink</span>
        </div>
        
        <div class="user-profile">
          <button id="theme-toggle-btn" class="btn-icon" title="Alternar Tema">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          
          <button id="settings-btn" class="btn-icon" title="Definições">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>

          <button id="logout-btn" class="btn-icon" title="Sair">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          </button>
        </div>
      </header>

      <main>
        <!-- Welcome Hero -->
        <section class="hero-section" style="margin-bottom: 3rem; animation: slideUp 0.8s var(--transit-smooth);">
          <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem;">Olá! Para onde vamos hoje?</h1>
          <p style="color: var(--text-secondary); font-size: 1.1rem;">Organize e aceda aos seus recursos favoritos com estilo.</p>
        </section>

        <section class="controls-section">
          <div class="search-bar glass">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" /><line x1="21" x2="16.65" y1="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="O que procura?" />
          </div>
          <div class="actions" style="display: flex; gap: 0.75rem;">
            <button id="add-link-btn" class="btn btn-primary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Novo Link
            </button>
            <button id="add-category-btn" class="btn btn-secondary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              Nova Stack
            </button>
            <button id="toggle-view-btn" class="btn-icon-soft btn-secondary" title="Mudar Visualização">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </button>
          </div>
        </section>

        <section class="categories-grid" id="categories-container">
          <!-- Dynamic Categories -->
        </section>
      </main>
    </div>
  </div>

  <!-- Dialogs (Redesign) -->
  <dialog id="category-links-dialog" class="glass-dialog full-screen-dialog">
    <div class="mobile-pull-bar"></div>
    <div class="dialog-header">
      <div class="header-content">
        <span id="modal-category-icon" class="category-icon-large"></span>
        <h2 id="modal-category-title">Stack</h2>
      </div>
      <div class="header-actions">
        <button type="button" class="btn-icon" onclick="this.closest('dialog').close()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="dialog-body">
      <div class="links-grid" id="modal-links-container"></div>
    </div>
  </dialog>

  <!-- Add Link Dialog -->
  <dialog id="link-dialog" class="glass-dialog">
    <form method="dialog" id="link-form">
      <h2 style="margin-bottom: 2rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Guardar Novo Link</h2>
      
      <div class="form-group">
        <label>Endereço URL</label>
        <input type="url" id="link-url" required placeholder="https://exemplo.com" />
      </div>
      
      <div class="form-group">
        <label>Título Amigável</label>
        <input type="text" id="link-title" required placeholder="Título do recurso" />
      </div>
      
      <div class="form-group">
        <label>Notas Rápidas</label>
        <textarea id="link-description" rows="2" placeholder="O que há de interessante aqui?"></textarea>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label>Stack / Categoria</label>
          <select id="link-category"><option value="">Geral</option></select>
        </div>
        <div class="form-group">
          <label>Personalizar Ícone</label>
          <select id="link-icon"><option value="">Automático</option></select>
        </div>
      </div>

      <div class="form-actions" style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
        <button type="button" class="btn btn-secondary" onclick="this.closest('dialog').close()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Adicionar Link</button>
      </div>
    </form>
  </dialog>

  <!-- Add Category Dialog -->
  <dialog id="category-dialog" class="glass-dialog">
    <form method="dialog" id="category-form">
      <h2 style="margin-bottom: 2rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Criar Nova Stack</h2>
      
      <div class="form-group">
        <label>Nome da Stack</label>
        <input type="text" id="cat-name" required placeholder="Ex: Design Inspiration, Dev Tools..." />
      </div>
      
      <div class="form-group">
        <label>Ícone Representativo</label>
        <select id="cat-icon"></select>
      </div>
      
      <div class="form-group">
        <label>Cor de Identidade</label>
        <input type="color" id="cat-color" value="#3b82f6" style="height: 3rem; padding: 0.25rem; cursor: pointer;" />
      </div>

      <div class="form-actions" style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
        <button type="button" class="btn btn-secondary" onclick="this.closest('dialog').close()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Criar Stack</button>
      </div>
    </form>
  </dialog>
  
  <dialog id="settings-dialog" class="glass-dialog">
    <form method="dialog" id="settings-form">
      <div class="dialog-header-inline" style="margin-bottom: 2rem;">
        <h2 style="background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Personalização</h2>
      </div>

      <div class="settings-grid" style="display: flex; flex-direction: column; gap: 1.5rem;">
        
        <!-- Theme Mode Toggle -->
        <div class="settings-group">
            <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.75rem;">Modo de Cor</label>
            <div style="display: flex; gap: 0.5rem;">
                <button type="button" class="btn btn-secondary flex-grow theme-opt" data-theme="dark" style="flex: 1;">Escuro</button>
                <button type="button" class="btn btn-secondary flex-grow theme-opt" data-theme="light" style="flex: 1;">Claro</button>
            </div>
        </div>

        <!-- Accent Colors -->
        <div class="settings-group">
            <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.75rem;">Cores de Destaque</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="color-input-wrapper glass" style="padding: 0.5rem; border-radius: 12px; display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--border-color);">
                    <input type="color" id="primary-color-input" value="#4f46e5" style="border: none; background: none; width: 32px; height: 32px; cursor: pointer;">
                    <span style="font-size: 0.85rem; font-weight: 500;">Primária</span>
                </div>
                <div class="color-input-wrapper glass" style="padding: 0.5rem; border-radius: 12px; display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--border-color);">
                    <input type="color" id="secondary-color-input" value="#9333ea" style="border: none; background: none; width: 32px; height: 32px; cursor: pointer;">
                    <span style="font-size: 0.85rem; font-weight: 500;">Secundária</span>
                </div>
            </div>
        </div>

        <!-- Base Hue -->
        <div class="settings-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">Tom de Base</label>
                <span id="base-hue-val" style="font-size: 0.85rem; font-weight: 600;">240°</span>
            </div>
            <input type="range" id="base-hue-input" min="0" max="360" value="240" style="width: 100%;">
        </div>

        <!-- Glassmorphism -->
        <div class="settings-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">Intensidade do Vidro</label>
                <span id="glass-opacity-val" style="font-size: 0.85rem; font-weight: 600;">60%</span>
            </div>
            <input type="range" id="glass-opacity-input" min="0" max="100" value="60" style="width: 100%;">
        </div>

        <!-- Blur -->
        <div class="settings-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">Desfoque (Blur)</label>
                <span id="glass-blur-val" style="font-size: 0.85rem; font-weight: 600;">16px</span>
            </div>
            <input type="range" id="glass-blur-input" min="0" max="40" value="16" style="width: 100%;">
        </div>

        <!-- Radius -->
        <div class="settings-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">Arredondamento</label>
                <span id="radius-val" style="font-size: 0.85rem; font-weight: 600;">24px</span>
            </div>
            <input type="range" id="radius-input" min="0" max="40" value="24" style="width: 100%;">
        </div>

      </div>

      <div class="form-actions" style="margin-top: 3rem; display: flex; justify-content: center;">
        <button type="button" class="btn btn-primary" onclick="this.closest('dialog').close()" style="padding: 0.75rem 3rem;">Concluir</button>
      </div>
    </form>
  </dialog>
</body>

</html>
